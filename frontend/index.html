<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talent Hunter — AI 人才猎手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; color: #1d1d1f; }
    .container { max-width: 860px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #6e6e73; margin-bottom: 32px; }

    #input-section textarea {
      width: 100%; height: 180px; padding: 14px; font-size: 15px;
      border: 2px solid #c7c7cc; border-radius: 10px; resize: vertical;
      font-family: inherit; outline: none; transition: border-color .2s;
      background: #ffffff; color: #1d1d1f; display: block;
    }
    #input-section textarea:focus { border-color: #0071e3; }
    .btn {
      margin-top: 14px; padding: 12px 32px; background: #0071e3; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .btn:hover { background: #0077ed; }
    .btn:disabled { background: #a1c4f5; cursor: not-allowed; }

    /* ── 进度区域 ── */
    #progress-section { display: none; margin-top: 32px; }
    .progress-bar-wrap { background: #e5e5ea; border-radius: 8px; height: 8px; overflow: hidden; margin: 12px 0 6px; }
    .progress-bar { height: 100%; background: #0071e3; transition: width .4s ease; border-radius: 8px; }
    .progress-text { color: #6e6e73; font-size: 14px; }

    /* 实时打分状态行 */
    .live-status {
      display: flex; align-items: center; gap: 10px;
      background: #fff; border-radius: 10px; padding: 12px 16px;
      margin-top: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.07);
      font-size: 14px; color: #3d3d3f;
    }
    .spinner {
      width: 18px; height: 18px; border: 2px solid #e5e5ea;
      border-top-color: #0071e3; border-radius: 50%;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .live-avatar {
      width: 28px; height: 28px; border-radius: 50%; object-fit: cover;
    }
    .live-name { font-weight: 600; color: #0071e3; }

    /* ── 候选人卡片 ── */
    #live-candidates { margin-top: 20px; }
    .section-title {
      font-size: 1rem; font-weight: 700; color: #6e6e73;
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: .05em;
    }

    .candidate-card {
      background: #fff; border-radius: 12px; padding: 20px;
      margin-bottom: 14px; display: flex; gap: 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      opacity: 0; transform: translateY(12px);
      transition: opacity .35s ease, transform .35s ease;
    }
    .candidate-card.visible { opacity: 1; transform: translateY(0); }
    .avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .card-body { flex: 1; min-width: 0; }
    .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    .rank { font-size: 13px; color: #6e6e73; font-weight: 600; flex-shrink: 0; }
    .name { font-size: 15px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .name a { color: #0071e3; text-decoration: none; }
    .name a:hover { text-decoration: underline; }
    .score-badge {
      flex-shrink: 0; padding: 3px 12px; border-radius: 20px;
      font-size: 14px; font-weight: 700; color: #fff;
    }
    .score-high { background: #34c759; }
    .score-mid  { background: #ff9500; }
    .score-low  { background: #ff3b30; }
    .reason { color: #3d3d3f; font-size: 14px; margin-bottom: 8px; line-height: 1.5; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .tag-strength { background: #d1f5e0; color: #1a7a3c; }
    .tag-gap      { background: #fde8e8; color: #9c1c1c; }

    /* ── 匹配等级徽章 ── */
    .tier-badge {
      flex-shrink: 0; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600; letter-spacing: .03em;
    }
    .tier-recommend { background: #e3f6ea; color: #1a7a3c; border: 1px solid #a8e6bb; }
    .tier-backup    { background: #fff3e0; color: #8a5000; border: 1px solid #ffcc80; }
    .tier-ref       { background: #f0f0f5; color: #6e6e73; border: 1px solid #d2d2d7; }

    /* ── 分组标题分隔线 ── */
    .tier-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 20px 0 12px; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em; color: #6e6e73;
    }
    .tier-divider::after {
      content: ''; flex: 1; height: 1px; background: #d2d2d7;
    }

    /* ── 结果头部 ── */
    #results-section { display: none; margin-top: 32px; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .results-header h2 { font-size: 1.3rem; }
    .export-btn { padding: 8px 20px; background: #34c759; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .export-btn:hover { background: #2fb350; }
    .new-search-btn { margin-top: 24px; padding: 10px 24px; background: #f5f5f7; color: #1d1d1f; border: 1.5px solid #d2d2d7; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .new-search-btn:hover { background: #e8e8ed; }

    .error-msg { background: #fff2f2; border: 1px solid #ffd0d0; border-radius: 10px; padding: 16px; color: #c00; margin-top: 20px; }

    /* ── Tab 导航 ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 2px solid #d2d2d7; }
    .tab-btn {
      padding: 10px 24px; border: none; background: none; cursor: pointer;
      font-size: 15px; font-weight: 600; color: #6e6e73;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: #0071e3; border-bottom-color: #0071e3; }
    .tab-btn:hover:not(.active) { color: #1d1d1f; }

    /* ── 查人区域 ── */
    #lookup-section { display: none; }
    .lookup-form { display: flex; flex-direction: column; gap: 12px; }
    .lookup-input {
      width: 100%; padding: 14px; font-size: 15px;
      border: 2px solid #c7c7cc; border-radius: 10px;
      font-family: inherit; outline: none; transition: border-color .2s;
      background: #fff; color: #1d1d1f;
    }
    .lookup-input:focus { border-color: #0071e3; }
    .lookup-jd {
      width: 100%; height: 120px; padding: 14px; font-size: 14px;
      border: 2px solid #c7c7cc; border-radius: 10px; resize: vertical;
      font-family: inherit; outline: none; transition: border-color .2s;
      background: #fff; color: #1d1d1f;
    }
    .lookup-jd:focus { border-color: #0071e3; }
    .lookup-jd-label { font-size: 13px; color: #6e6e73; margin-bottom: -4px; }

    /* ── 歧义候选列表 ── */
    .disambig-list { margin-top: 20px; }
    .disambig-item {
      display: flex; align-items: center; gap: 12px;
      background: #fff; border-radius: 10px; padding: 14px 16px;
      margin-bottom: 10px; cursor: pointer;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      transition: box-shadow .15s;
    }
    .disambig-item:hover { box-shadow: 0 3px 10px rgba(0,0,0,.12); }
    .disambig-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .disambig-login { font-weight: 700; font-size: 14px; color: #0071e3; }
    .disambig-bio { font-size: 13px; color: #6e6e73; margin-top: 2px; }

    /* ── 画像卡片（查人结果）── */
    #profile-result { margin-top: 24px; }
    .profile-card {
      background: #fff; border-radius: 14px; padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .profile-header { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 20px; }
    .profile-avatar { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .profile-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .profile-name a { color: #0071e3; text-decoration: none; }
    .profile-name a:hover { text-decoration: underline; }
    .profile-meta { font-size: 13px; color: #6e6e73; line-height: 1.8; }
    .profile-bio { font-size: 14px; color: #3d3d3f; margin-top: 6px; }
    .profile-section { margin-top: 16px; }
    .profile-section-title { font-size: 12px; font-weight: 700; color: #6e6e73; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .lang-bars { display: flex; flex-direction: column; gap: 6px; }
    .lang-row { display: flex; align-items: center; gap: 8px; }
    .lang-name { font-size: 13px; width: 100px; flex-shrink: 0; }
    .lang-bar-bg { flex: 1; background: #e5e5ea; border-radius: 4px; height: 8px; overflow: hidden; }
    .lang-bar-fill { height: 100%; background: #0071e3; border-radius: 4px; }
    .lang-pct { font-size: 12px; color: #6e6e73; width: 36px; text-align: right; flex-shrink: 0; }
    .repo-list { display: flex; flex-direction: column; gap: 8px; }
    .repo-item { background: #f5f5f7; border-radius: 8px; padding: 10px 14px; }
    .repo-item-top { display: flex; align-items: center; gap: 8px; }
    .repo-item-name { font-weight: 600; font-size: 14px; color: #0071e3; text-decoration: none; }
    .repo-item-stars { font-size: 13px; color: #6e6e73; }
    .repo-item-desc { font-size: 13px; color: #6e6e73; margin-top: 3px; }
    .score-section {
      margin-top: 20px; padding: 16px 20px;
      background: #f0f7ff; border-radius: 10px; border: 1px solid #b3d4f5;
    }
    .score-section-title { font-size: 13px; font-weight: 700; color: #0071e3; margin-bottom: 10px; }
    .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .lookup-error { background: #fff2f2; border: 1px solid #ffd0d0; border-radius: 10px; padding: 16px; color: #c00; margin-top: 20px; }
  </style>
</head>
<body>
<div class="container">
  <h1>🎯 Talent Hunter</h1>
  <p class="subtitle">AI 驱动的开发者人才搜索与画像工具</p>

  <!-- Tab 导航 -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-search" onclick="switchTab('search')">🔍 搜职位</button>
    <button class="tab-btn" id="tab-lookup" onclick="switchTab('lookup')">👤 查人</button>
  </div>

  <!-- 搜职位内容区 -->
  <div id="search-tab-content">

  <!-- 输入区 -->
  <div id="input-section">
    <textarea id="jd-input" placeholder="粘贴岗位描述（JD）到这里...

例如：我们需要一位有 3 年以上经验的 Go 后端工程师，熟悉微服务架构、Kubernetes 容器编排，有过高并发系统设计经验优先。"></textarea>
    <button class="btn" onclick="startSearch()">开始搜索</button>
  </div>

  <!-- 搜索进度区（含实时卡片） -->
  <div id="progress-section">
    <h2 id="progress-title">正在搜索候选人...</h2>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
    </div>
    <p class="progress-text" id="progress-text">正在解析岗位描述...</p>

    <!-- 当前正在打分的人 -->
    <div class="live-status" id="live-status" style="display:none">
      <div class="spinner"></div>
      <img class="live-avatar" id="live-avatar" src="" alt="" />
      <span id="live-name" class="live-name"></span>
      <span id="live-detail" style="color:#6e6e73"></span>
    </div>

    <!-- 实时出现的候选人卡片 -->
    <div id="live-candidates"></div>
  </div>

  <!-- 完成后的结果区 -->
  <div id="results-section">
    <div class="results-header">
      <h2 id="results-title">找到 0 位候选人</h2>
      <button class="export-btn" onclick="exportCSV()">导出 CSV</button>
    </div>
    <div id="candidates-list"></div>
    <button class="new-search-btn" onclick="resetSearch()">🔄 重新搜索</button>
  </div>

  </div><!-- /search-tab-content -->

  <!-- 查人区域 -->
  <div id="lookup-section">
    <div class="lookup-form">
      <input class="lookup-input" id="lookup-query" type="text"
             placeholder="GitHub 用户名 或 真实姓名（如 gaearon、Dan Abramov）"
             onkeydown="if(event.key==='Enter') submitLookup()" />
      <label class="lookup-jd-label" for="lookup-jd">对照岗位（可选）— 填写后同时输出与该岗位的匹配分</label>
      <textarea class="lookup-jd" id="lookup-jd"
                placeholder="粘贴岗位描述（选填）..."></textarea>
      <button class="btn" id="lookup-btn" onclick="submitLookup()">查询</button>
    </div>

    <!-- 歧义消解列表 -->
    <div class="disambig-list" id="disambig-list" style="display:none"></div>

    <!-- 画像结果 -->
    <div id="profile-result"></div>
  </div>

</div>

<script>
let currentJobId = null;
let pollTimer = null;
let knownUsernames = new Set();

// 页面加载时确保显示输入区
document.addEventListener('DOMContentLoaded', () => showSection('input'));

// ── 启动搜索 ──
function startSearch() {
  const jdText = document.getElementById('jd-input').value.trim();
  if (!jdText) { alert('请先输入岗位描述'); return; }
  document.querySelector('#input-section .btn').disabled = true;
  knownUsernames.clear();
  document.getElementById('live-candidates').innerHTML = '';
  showSection('progress');

  fetch('/api/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ jd_text: jdText })
  })
  .then(r => r.json())
  .then(data => { currentJobId = data.job_id; pollStatus(); })
  .catch(err => showError('请求失败：' + err.message));
}

// ── 轮询状态（每 2 秒） ──
function pollStatus() {
  if (!currentJobId) return;
  fetch(`/api/status/${currentJobId}`)
    .then(r => r.json())
    .then(data => {
      updateProgress(data);
      renderLiveCandidates(data.candidates || []);

      if (data.status === 'done' || (data.total > 0 && data.scored >= data.total)) {
        finishSearch(data);
      } else if (data.status === 'error') {
        showError('搜索失败：' + (data.error || '未知错误'));
      } else {
        pollTimer = setTimeout(pollStatus, 2000);
      }
    })
    .catch(() => { pollTimer = setTimeout(pollStatus, 3000); });
}

// ── 更新进度条和文字 ──
function updateProgress(data) {
  const bar = document.getElementById('progress-bar');
  const text = document.getElementById('progress-text');
  const liveStatus = document.getElementById('live-status');

  if (data.status === 'pending') {
    bar.style.width = '5%';
    text.textContent = '正在初始化...';
    liveStatus.style.display = 'none';
  } else if (data.status === 'searching') {
    bar.style.width = '25%';
    text.textContent = '正在从 GitHub 搜索候选人...';
    liveStatus.style.display = 'none';
  } else if (data.status === 'scoring') {
    const pct = data.total > 0 ? Math.round(25 + (data.scored / data.total) * 70) : 30;
    bar.style.width = pct + '%';
    text.textContent = `AI 正在评分 ${data.scored} / ${data.total} 位候选人`;
    liveStatus.style.display = 'flex';
  } else if (data.status === 'done') {
    bar.style.width = '100%';
    text.textContent = `✅ 完成！共评估 ${data.total} 位候选人`;
    liveStatus.style.display = 'none';
  }
}

// ── 实时追加新候选人卡片（带飞入动画） ──
function renderLiveCandidates(candidates) {
  if (!candidates || candidates.length === 0) return;
  const container = document.getElementById('live-candidates');

  // 实时流展示 score >= 40（推荐+备选），<40 的低分杂质不出现
  const newOnes = candidates.filter(c => !knownUsernames.has(c.username) && c.score >= 40);

  newOnes.forEach(c => {
    knownUsernames.add(c.username);

    // 更新「正在打分」提示（显示最新这个人）
    document.getElementById('live-avatar').src = c.avatar_url;
    document.getElementById('live-name').textContent = '@' + c.username;
    document.getElementById('live-detail').textContent =
      c.score ? `→ ${c.score}分` : '正在评分...';

    // 创建卡片
    const card = document.createElement('div');
    card.className = 'candidate-card';
    card.id = 'card-' + c.username;
    const scoreClass = c.score >= 80 ? 'score-high' : c.score >= 60 ? 'score-mid' : 'score-low';
    const tierClass  = c.score >= 60 ? 'tier-recommend' : c.score >= 40 ? 'tier-backup' : 'tier-ref';
    const tierLabel  = c.tier || (c.score >= 60 ? '推荐' : c.score >= 40 ? '可备选' : '仅供参考');
    const strengths = (c.strengths || []).map(s => `<span class="tag tag-strength">${s}</span>`).join('');
    const gaps = (c.gaps || []).map(g => `<span class="tag tag-gap">${g}</span>`).join('');
    card.innerHTML = `
      <img class="avatar" src="${c.avatar_url}" alt="${c.username}"
           onerror="this.src='https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'"/>
      <div class="card-body">
        <div class="card-top">
          <span class="rank">#${c.rank}</span>
          <span class="tier-badge ${tierClass}">${tierLabel}</span>
          <span class="name"><a href="${c.html_url}" target="_blank">@${c.username}</a>${c.company ? ' · ' + c.company : ''}${c.location ? ' · 📍' + c.location : ''}</span>
          <span class="score-badge ${scoreClass}">${c.score}分</span>
        </div>
        <p class="reason">${c.reason}</p>
        <div class="tags">${strengths}${gaps}</div>
      </div>`;

    container.prepend(card);  // 新卡片出现在顶部
    // 触发飞入动画
    requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('visible')));
  });
}

// ── 渲染单张候选人卡片 HTML ──
function candidateCardHTML(c) {
  const scoreClass = c.score >= 80 ? 'score-high' : c.score >= 60 ? 'score-mid' : 'score-low';
  const tierClass  = c.score >= 60 ? 'tier-recommend' : c.score >= 40 ? 'tier-backup' : 'tier-ref';
  const tierLabel  = c.tier || (c.score >= 60 ? '推荐' : c.score >= 40 ? '可备选' : '仅供参考');
  const strengths  = (c.strengths || []).map(s => `<span class="tag tag-strength">${s}</span>`).join('');
  const gaps       = (c.gaps || []).map(g => `<span class="tag tag-gap">${g}</span>`).join('');
  return `<div class="candidate-card visible">
    <img class="avatar" src="${c.avatar_url}" alt="${c.username}"
         onerror="this.src='https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'"/>
    <div class="card-body">
      <div class="card-top">
        <span class="rank">#${c.rank}</span>
        <span class="tier-badge ${tierClass}">${tierLabel}</span>
        <span class="name"><a href="${c.html_url}" target="_blank">@${c.username}</a>${c.company ? ' · ' + c.company : ''}${c.location ? ' · 📍' + c.location : ''}</span>
        <span class="score-badge ${scoreClass}">${c.score}分</span>
      </div>
      <p class="reason">${c.reason}</p>
      <div class="tags">${strengths}${gaps}</div>
    </div>
  </div>`;
}

// ── 搜索完成，切换到结果视图 ──
function finishSearch(data) {
  const all        = data.candidates || [];
  const recommended = all.filter(c => c.score >= 60);
  const backups     = all.filter(c => c.score >= 40 && c.score < 60);
  const totalScored = data.scored || 0;
  const hidden      = totalScored - all.length;   // 后端已丢弃的 <40 数量

  const list = document.getElementById('candidates-list');

  // ── 没有任何候选人（极端情况）──────────────────────────────────────────
  if (all.length === 0) {
    document.getElementById('results-title').textContent = '未找到匹配候选人';
    list.innerHTML = `
      <div style="background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:24px;text-align:center;color:#5d4037;">
        <div style="font-size:2rem;margin-bottom:12px;">🔍</div>
        <p style="font-size:15px;font-weight:600;margin-bottom:8px;">本次搜索未找到任何候选人</p>
        <p style="font-size:13px;color:#795548;">共评估 ${totalScored} 位，均因主语言或核心技能不符被过滤</p>
        <p style="font-size:13px;color:#795548;margin-top:6px;">建议：补充框架名称（如 React、Next.js）或放宽经验年限后重试</p>
      </div>`;
    showSection('results');
    return;
  }

  // ── 标题统计 ──────────────────────────────────────────────────────────
  const titleParts = [];
  if (recommended.length) titleParts.push(`${recommended.length} 位推荐`);
  if (backups.length)     titleParts.push(`${backups.length} 位可备选`);
  const hiddenNote = hidden > 0 ? `（${hidden} 位低匹配已过滤）` : '';
  document.getElementById('results-title').textContent =
    `找到 ${titleParts.join(' · ')} ${hiddenNote}`;

  // ── 分层渲染 ──────────────────────────────────────────────────────────
  let html = '';

  if (recommended.length) {
    html += `<div class="tier-divider">✅ 推荐候选人 · score ≥ 60</div>`;
    html += recommended.map(candidateCardHTML).join('');
  }

  if (backups.length) {
    const backupNote = recommended.length === 0
      ? '（本次无高匹配候选人，以下为最佳备选）'
      : '';
    html += `<div class="tier-divider">📋 可备选 · score 40–59 ${backupNote}</div>`;
    html += backups.map(candidateCardHTML).join('');
  }

  list.innerHTML = html;
  showSection('results');
}

function exportCSV() { if (currentJobId) window.open(`/api/export/${currentJobId}`, '_blank'); }

function resetSearch() {
  if (pollTimer) clearTimeout(pollTimer);
  currentJobId = null;
  knownUsernames.clear();
  document.getElementById('jd-input').value = '';
  document.getElementById('live-candidates').innerHTML = '';
  document.getElementById('candidates-list').innerHTML = '';
  document.getElementById('progress-bar').style.width = '0%';
  document.querySelector('#input-section .btn').disabled = false;
  showSection('input');
}

function showSection(name) {
  document.getElementById('input-section').style.display = name === 'input' ? '' : 'none';
  document.getElementById('progress-section').style.display = name === 'progress' ? '' : 'none';
  document.getElementById('results-section').style.display = name === 'results' ? '' : 'none';
}

function switchTab(tab) {
  const isSearch = tab === 'search';
  document.getElementById('search-tab-content').style.display = isSearch ? '' : 'none';
  document.getElementById('lookup-section').style.display = isSearch ? 'none' : '';
  document.getElementById('tab-search').classList.toggle('active', isSearch);
  document.getElementById('tab-lookup').classList.toggle('active', !isSearch);
  if (isSearch) showSection('input');
}

// ── HTML escaping helper (prevents XSS from API-returned data) ───────────
function escapeHtml(str) {
  if (str == null) return '';
  var div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

// ── 查人功能 ────────────────────────────────────────────────────────────────

function submitLookup() {
  const query = document.getElementById('lookup-query').value.trim();
  if (!query) { alert('请输入 GitHub 用户名或真实姓名'); return; }

  const jdText = document.getElementById('lookup-jd').value.trim();
  const btn = document.getElementById('lookup-btn');
  btn.disabled = true;
  btn.textContent = '查询中...';

  document.getElementById('disambig-list').style.display = 'none';
  document.getElementById('profile-result').innerHTML =
    '<div class="live-status"><div class="spinner"></div><span>正在查询...</span></div>';

  fetch('/api/lookup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query, jd_text: jdText })
  })
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(data => {
    btn.disabled = false;
    btn.textContent = '查询';
    if (data.status === 'found') {
      document.getElementById('profile-result').innerHTML = renderProfileCard(data.profile, data.score_result, data.score_error);
    } else if (data.status === 'ambiguous') {
      document.getElementById('profile-result').innerHTML = '';
      renderDisambig(data.candidates, jdText);
    } else {
      document.getElementById('profile-result').innerHTML =
        '<div class="lookup-error">❌ 未找到该用户，请检查用户名是否正确</div>';
    }
  })
  .catch(err => {
    btn.disabled = false;
    btn.textContent = '查询';
    document.getElementById('profile-result').innerHTML =
      '<div class="lookup-error">❌ 请求失败：' + escapeHtml(err.message) + '</div>';
  });
}

function renderDisambig(candidates, jdText) {
  const list = document.getElementById('disambig-list');
  list.style.display = '';
  list.innerHTML = '<p style="font-size:14px;color:#6e6e73;margin-bottom:12px;">找到 ' + candidates.length + ' 个匹配用户，请选择：</p>' +
    candidates.map(function(c) {
      return '<div class="disambig-item" onclick="pickDisambig(\'' + c.login.replace(/['"\\]/g, '') + '\')">' +
        '<img class="disambig-avatar" src="' + c.avatar_url + '" onerror="this.src=\'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\'" />' +
        '<div><div class="disambig-login">@' + escapeHtml(c.login) + '</div>' +
        (c.bio ? '<div class="disambig-bio">' + escapeHtml(c.bio.substring(0, 80)) + '</div>' : '') +
        '</div></div>';
    }).join('');
}

function pickDisambig(login) {
  document.getElementById('lookup-query').value = login;
  document.getElementById('disambig-list').style.display = 'none';
  submitLookup();
}

function renderProfileCard(profile, scoreResult, scoreError) {
  // Language bars (top 5)
  var langs = Object.entries(profile.languages || {}).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 5);
  var total = langs.reduce(function(s, kv) { return s + kv[1]; }, 0) || 1;
  var langBars = langs.map(function(kv) {
    var pct = Math.round(kv[1] * 100 / total);
    return '<div class="lang-row"><span class="lang-name">' + escapeHtml(kv[0]) + '</span>' +
      '<div class="lang-bar-bg"><div class="lang-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="lang-pct">' + pct + '%</span></div>';
  }).join('');

  // Repos
  var repoItems = (profile.top_repos || []).map(function(r) {
    return '<div class="repo-item"><div class="repo-item-top">' +
      '<a class="repo-item-name" href="' + profile.html_url + '/' + encodeURIComponent(r.name) + '" target="_blank">' + escapeHtml(r.name) + '</a>' +
      '<span class="repo-item-stars">⭐ ' + (r.stars || 0).toLocaleString() + '</span></div>' +
      (r.description ? '<div class="repo-item-desc">' + escapeHtml(r.description.substring(0, 80)) + '</div>' : '') +
      '</div>';
  }).join('');

  // Score section
  var scoreHtml = '';
  if (scoreResult) {
    var scoreClass = scoreResult.score >= 80 ? 'score-high' : scoreResult.score >= 60 ? 'score-mid' : 'score-low';
    var tierClass  = scoreResult.score >= 60 ? 'tier-recommend' : scoreResult.score >= 40 ? 'tier-backup' : 'tier-ref';
    var tierLabel  = scoreResult.score >= 60 ? '推荐' : scoreResult.score >= 40 ? '可备选' : '仅供参考';
    var strengths  = (scoreResult.strengths || []).map(function(s) { return '<span class="tag tag-strength">' + escapeHtml(s) + '</span>'; }).join('');
    var gaps       = (scoreResult.gaps || []).map(function(g) { return '<span class="tag tag-gap">' + escapeHtml(g) + '</span>'; }).join('');
    scoreHtml = '<div class="score-section"><div class="score-section-title">岗位匹配分析</div>' +
      '<div class="score-row"><span class="score-badge ' + scoreClass + '">' + scoreResult.score + '分</span>' +
      '<span class="tier-badge ' + tierClass + '">' + tierLabel + '</span></div>' +
      '<p class="reason">' + escapeHtml(scoreResult.reason) + '</p>' +
      '<div class="tags">' + strengths + gaps + '</div></div>';
  } else if (scoreError) {
    scoreHtml = '<div class="lookup-error" style="margin-top:12px">⚠️ 评分失败：' + scoreError + '</div>';
  }

  // Meta row
  var metaParts = [];
  if (profile.location) metaParts.push('📍 ' + escapeHtml(profile.location));
  if (profile.company)  metaParts.push('🏢 ' + escapeHtml(profile.company));
  if (profile.blog)     metaParts.push('🔗 <a href="' + profile.blog + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(profile.blog.replace(/^https?:\/\//, '')) + '</a>');
  metaParts.push('👥 ' + (profile.followers || 0).toLocaleString() + ' followers');
  metaParts.push('📦 ' + (profile.public_repos || 0) + ' repos');
  if (profile.last_active) metaParts.push('🕐 最近活跃 ' + profile.last_active);

  return '<div class="profile-card">' +
    '<div class="profile-header">' +
    '<img class="profile-avatar" src="' + profile.avatar_url + '" onerror="this.src=\'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\'" />' +
    '<div><div class="profile-name"><a href="' + profile.html_url + '" target="_blank">@' + escapeHtml(profile.username) + '</a></div>' +
    '<div class="profile-meta">' + metaParts.join(' · ') + '</div>' +
    (profile.bio ? '<div class="profile-bio">' + escapeHtml(profile.bio) + '</div>' : '') +
    '</div></div>' +
    (langs.length ? '<div class="profile-section"><div class="profile-section-title">编程语言分布</div><div class="lang-bars">' + langBars + '</div></div>' : '') +
    (repoItems ? '<div class="profile-section"><div class="profile-section-title">代表项目</div><div class="repo-list">' + repoItems + '</div></div>' : '') +
    scoreHtml +
    '</div>';
}

function showError(msg) {
  if (pollTimer) clearTimeout(pollTimer);
  const prog = document.getElementById('progress-section');
  prog.innerHTML = `<div class="error-msg">❌ ${msg}</div>
    <button class="new-search-btn" onclick="resetSearch()" style="margin-top:16px">重新搜索</button>`;
  prog.style.display = '';
}
</script>
